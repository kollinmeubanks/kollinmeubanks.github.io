<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Georgia Stingerz Team Store</title>

  <style>
    :root {
      --navy: #071D3A;
      --blue: #66BEEF;
      --white: #FFFFFF;
      --light: #F4F8FC;
      --dark: #1E2630;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--light);
      color: var(--dark);
    }

    .hero {
      background:
        linear-gradient(rgba(7,29,58,.92), rgba(7,29,58,.92)),
        radial-gradient(circle at top, var(--blue), var(--navy));
      color: var(--white);
      text-align: center;
      padding: 42px 20px 36px;
      border-bottom: 6px solid var(--blue);
    }

    .logo {
      max-width: 150px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 64px);
      letter-spacing: 3px;
      font-weight: 900;
    }

    .hero p {
      margin: 10px auto 0;
      max-width: 700px;
      font-size: 18px;
      line-height: 1.4;
    }

    .store-shell {
      max-width: 1450px;
      margin: 28px auto;
      padding: 0 16px;
    }

    .store-card {
      background: var(--white);
      border: 3px solid var(--navy);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,.12);
    }

    .store-header {
      background: var(--navy);
      color: var(--white);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .store-header strong {
      font-size: 20px;
      letter-spacing: 1px;
    }

    .shop-link {
      background: var(--blue);
      color: var(--navy);
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 800;
    }

    #sqd-container {
      min-height: 900px;
      background: var(--white);
      padding: 10px;
    }

    .fallback {
      text-align: center;
      padding: 24px;
      display: none;
    }

    .fallback a {
      color: var(--navy);
      font-weight: 800;
    }

    .footer {
      text-align: center;
      background: var(--navy);
      color: var(--white);
      padding: 24px 16px;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <section class="hero">
    <!-- Upload your logo to GitHub as logo.png -->
    <img src="logo.png" class="logo" alt="Georgia Stingerz Logo" onerror="this.style.display='none'">
    <h1>GEORGIA STINGERZ</h1>
    <p>Official Stingerz Team Store — gear, apparel, and fan wear powered by SquadLocker.</p>
  </section>

  <main class="store-shell">
    <div class="store-card">
      <div class="store-header">
        <strong>OFFICIAL TEAM STORE</strong>
        <a class="shop-link" href="https://teamlocker.squadlocker.com/stores/georgia-stingerz-2872574" target="_blank">
          Open Full Store
        </a>
      </div>

      <div id="sqd-container"></div>

      <div class="fallback" id="fallback">
        The embedded store did not load.
        <br><br>
        <a href="https://teamlocker.squadlocker.com/stores/georgia-stingerz-2872574" target="_blank">
          Click here to open the Georgia Stingerz SquadLocker store.
        </a>
      </div>
    </div>
  </main>

  <footer class="footer">
    © 2026 Georgia Stingerz Baseball
  </footer>

  <script src="https://d2c-cta.s3-us-west-2.amazonaws.com/build/sqd/index.js"></script>

  <script>
    window.onload = function () {
      try {
        new sqd({
          container: 'sqd-container',
          moduleType: 'standard',
          lockerId: '2872574',
          environment: 'production',
          theme: {
            fontFamily: "'Arial', sans-serif",
            color: '#071D3A',
            backgroundColor: '#FFFFFF',
            accentColor: '#66BEEF'
          }
        });
      } catch (error) {
        document.getElementById('fallback').style.display = 'block';
        console.error('SquadLocker widget failed to load:', error);
      }
    };
  </script>
</body>
</html>
